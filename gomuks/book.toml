[book]
authors = ["Tulir Asokan"]
language = "en"
multilingual = false
src = "."
title = "gomuks"
site-url = "/gomuks/"

[build]
build-dir = "../dist/gomuks"

[preprocessor.links]

[output.html]
git-repository-url = "https://github.com/mautrix/docs"
git-repository-icon = "fa-github"
additional-css = ["../bridges/additional.css"]
theme = "../theme/gomuks"

[output.html.redirect]
"/api/http.html" = "https://spec.mau.fi/gomuks/http.html"
"/api/rpc.html" = "https://spec.mau.fi/gomuks/rpc.html"
"/commands.html" = "https://github.com/mautrix/docs/blob/a904952822e967c3f71c2a75d1e2bf904f167db2/gomuks/commands.md"
"/debugging.html" = "https://github.com/mautrix/docs/blob/a904952822e967c3f71c2a75d1e2bf904f167db2/gomuks/debugging.md"
"/keybindings.html" = "https://github.com/mautrix/docs/blob/a904952822e967c3f71c2a75d1e2bf904f167db2/gomuks/keybindings.md"
"/shortcuts.html" = "https://github.com/mautrix/docs/blob/a904952822e967c3f71c2a75d1e2bf904f167db2/gomuks/shortcuts.md"

[output.linkcheck]
optional = true
user-agent = "Mozilla/5.0 (X11; Linux x86_64; rv:88.0) Gecko/20100101 Firefox/88.0"
cache-timeout = 604800
exclude = []
traverse-parent-directories = false
